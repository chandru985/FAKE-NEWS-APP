<!DOCTYPE html>
<html>
<head>
    <title>Live News</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FakeNews">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">
</head>

<body>

<div class="news-container">
    <h1>🌐 Live News</h1>

    <div class="news-grid">
        {% for article in articles %}
        <div class="news-card">

            {% if article.urlToImage %}
            <img src="{{ article.urlToImage }}" alt="news image">
            {% endif %}

            <div class="news-content">
                <h3>{{ article.title }}</h3>
                <p>{{ article.description }}</p>

                <form action="/predict" method="post">
                    <input type="hidden" name="news" value="{{ article.title }}">
                    <button>Check Fake News</button>
                </form>
                <form action="/predict" method="post">
                    <input type="hidden" name="news" value="{{ article.title }}">
                    <input type="hidden" name="use_verification" value="true">
                     <button type="submit" class="verify-btn">AI Verify</button>
                </form>
            </div>

        </div>
        {% endfor %}
    </div>

    <a href="/"><button class="back-btn">⬅ Back</button></a>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
}
</script>
</html>
